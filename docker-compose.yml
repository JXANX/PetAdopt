services:
  db:
    image: postgres:15
    container_name: pet_adoption_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pet_adoption_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pet_adoption_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pet_adoption_app
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: pet_adoption_db
      JWT_SECRET: petadoptionsecret
      CORS_ORIGIN: http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/usr/src/app/uploads

volumes:
  postgres_data:
