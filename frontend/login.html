<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adopta un Amigo 🐾</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <h1>¡Hola de nuevo! 🐾</h1>
        <p>Inicia sesión para encontrar a tu mejor amigo.</p>
        
        <div id="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Tu nombre de usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
        
        <p style="margin-top: 1.5rem; font-size: 0.875rem;">
            ¿No tienes cuenta? <a href="register.html" style="color: var(--primary-dark); font-weight: 600;">Regístrate aquí</a>
        </p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
