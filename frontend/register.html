<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Adopta un Amigo 🐾</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-container">
    <div class="auth-card">
        <h1>Únete a nosotros 🐾</h1>
        <p>Crea una cuenta para poder adoptar.</p>

        <div id="error-message"></div>
        <div id="success-message"
            style="display: none; color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem;">
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Tu nombre de usuario" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico (Opcional)</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="phone">Teléfono (Opcional)</label>
                <input type="text" id="phone" placeholder="Tu número">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
        </form>

        <p style="margin-top: 1.5rem; font-size: 0.875rem;">
            ¿Ya tienes cuenta? <a href="login.html" style="color: var(--primary-dark); font-weight: 600;">Inicia sesión
                aquí</a>
        </p>
    </div>
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
