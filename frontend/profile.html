<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Adopta un Amigo 🐾</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <a href="dashboard.html" class="logo"><span>🐾</span> Adopta un Amigo</a>
        <div class="nav-links">
            <a href="dashboard.html">Inicio</a>
            <a href="pets.html">Mascotas</a>
            <a href="adoptions.html">Solicitudes</a>
            <a href="profile.html">Mi Perfil</a>
            <button id="logoutBtn" class="btn btn-outline">Salir</button>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <header style="margin-bottom: 2rem; text-align: center;">
            <div
                style="width: 100px; height: 100px; background: #fbbf24; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 1rem;">
                👤</div>
            <h1 id="profileUsername">Cargando...</h1>
            <p color="var(--text-muted)">Actualiza tu información de contacto aquí.</p>
        </header>

        <form id="profileForm" class="auth-card" style="max-width: none; text-align: left; padding: 2rem;">
            <div id="profile-success-message"
                style="display: none; background: #dcfce7; color: #166534; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem;">
                ¡Perfil actualizado con éxito! ✨
            </div>

            <div class="form-group">
                <label for="p-username">Nombre de Usuario</label>
                <input type="text" id="p-username" readonly style="background: #f9fafb; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label for="p-email">Correo Electrónico</label>
                <input type="email" id="p-email" placeholder="tu@email.com">
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="p-phone">Teléfono</label>
                <input type="tel" id="p-phone" placeholder="+00 000 000 000">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Guardar Cambios</button>
        </form>
    </div>
    <script src="js/config.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
